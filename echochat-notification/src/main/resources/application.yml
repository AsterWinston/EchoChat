spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:ubuntu}:${MYSQL_PORT:3306}/echochat?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1500000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      validation-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:ubuntu}
      port: 6379
      password: ${REDIS_PASSWORD:redis123456}
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 4
  main:
    allow-bean-definition-overriding: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    org.apache.rocketmq: WARN
    io.netty: WARN
    com.alibaba.nacos: WARN
    org.springframework.cloud: WARN
    org.springframework.data.redis: WARN
    me.aster.echochat: DEBUG

snowflake:
  worker-id: 9
  datacenter-id: 1

# 服务间（/internal/**）认证共享令牌（开发默认值；生产环境通过INTERNAL_TOKEN环境变量覆盖）
security:
  internal-token: ${INTERNAL_TOKEN:444d651da438dde74ab860fe8d28ec99db174f365081c218a98f4a078314bb6c}

# 通知事件的 RocketMQ 消费者
rocketmq:
  name-server: ${ROCKETMQ_HOST:ubuntu}:9876
  consumer:
    group: echochat-notification-consumer
